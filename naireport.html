<!DOCTYPE html>
<html lang="en" class="bg-gray-900 text-white">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>naimonitor Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>
<body class="p-4 font-mono">

  <header class="text-center mb-6">
    <h1 class="text-4xl font-bold text-green-400">🛡️ naimonitor Realtime Dashboard</h1>
    <p class="text-gray-400">Pantauan ancaman dan anomali AI dari Apache server</p>
  </header>

  <div class="flex justify-center mb-4">
    <input id="datePicker" class="p-2 rounded bg-gray-800 text-white border border-gray-600" placeholder="Pilih tanggal" />
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
    <div class="bg-gray-800 p-4 rounded-xl shadow-md">
      <h2 class="text-xl font-bold mb-2">📊 Statistik Ancaman</h2>
      <canvas id="threatChart" height="200"></canvas>
    </div>
    <div class="bg-gray-800 p-4 rounded-xl shadow-md">
      <h2 class="text-xl font-bold mb-2">📅 Rincian Terbaru</h2>
      <div id="latestLog" class="text-sm text-green-400 whitespace-pre-line"></div>
    </div>
  </div>

  <footer class="text-center text-gray-500 mt-10">
    &copy; 2025 naimonitor. Dashboard ini diperbarui secara realtime.
  </footer>

  <script>
    let threatChart;

    const initChart = (data) => {
      const ctx = document.getElementById("threatChart").getContext("2d");
      if (threatChart) threatChart.destroy();
      threatChart = new Chart(ctx, {
        type: "bar",
        data: {
          labels: ["Low", "Medium", "High", "Critical"],
          datasets: [{
            label: "Jumlah Ancaman",
            data: [
              data.Low || 0,
              data.Medium || 0,
              data.High || 0,
              data.Critical || 0
            ],
            backgroundColor: ["#10B981", "#F59E0B", "#EF4444", "#991B1B"],
          }],
        },
        options: {
          responsive: true,
          scales: {
            y: { beginAtZero: true }
          }
        }
      });
    };

    const updateDashboard = async (selectedDate = null) => {
      try {
        const res = await fetch("report.json?ts=" + new Date().getTime());
        const json = await res.json();

        let data = json;

        if (selectedDate) {
          const filtered = json.history?.find(item => item.date === selectedDate);
          if (filtered) data = filtered;
        }

        initChart(data.threat_count || {});
        document.getElementById("latestLog").textContent = data.latest_evidence || "Tidak ada log terbaru.";
      } catch (err) {
        console.error("Gagal memuat data:", err);
      }
    };

    flatpickr("#datePicker", {
      dateFormat: "Y-m-d",
      onChange: function(selectedDates, dateStr) {
        updateDashboard(dateStr);
      }
    });

    // Update otomatis tiap 5 detik
    updateDashboard();
    setInterval(updateDashboard, 5000);
  </script>
</body>
</html>
