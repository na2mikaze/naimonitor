<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real-Time Attack Monitoring</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/font-awesome/css/font-awesome.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f7fc;
      }
      .container {
        margin-top: 50px;
      }
      .card-header {
        background-color: #007bff;
        color: white;
      }
      .card-body {
        background-color: #f8f9fa;
      }
      .alert {
        font-size: 1.1em;
      }
      .indicator {
        font-size: 2em;
      }
      .data-container {
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
      }
      .data-box {
        margin: 20px;
        text-align: center;
      }
      .data-box h4 {
        margin-top: 10px;
      }
      .badge {
        font-size: 1.5em;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="card-header">
          <h3>Real-Time Attack Monitoring</h3>
        </div>
        <div class="card-body">
          <div class="data-container">
            <!-- Dynamic data boxes for threat levels -->
            <div class="data-box">
              <i class="fa fa-warning indicator text-warning"></i>
              <h4>Low Threats</h4>
              <h3 id="low-threat" class="badge bg-warning">0</h3>
            </div>
            <div class="data-box">
              <i class="fa fa-exclamation-circle indicator text-primary"></i>
              <h4>Medium Threats</h4>
              <h3 id="medium-threat" class="badge bg-primary">0</h3>
            </div>
            <div class="data-box">
              <i class="fa fa-exclamation-triangle indicator text-danger"></i>
              <h4>High Threats</h4>
              <h3 id="high-threat" class="badge bg-danger">0</h3>
            </div>
            <div class="data-box">
              <i class="fa fa-bomb indicator text-dark"></i>
              <h4>Critical Threats</h4>
              <h3 id="critical-threat" class="badge bg-dark">0</h3>
            </div>
          </div>
          <div class="mt-5">
            <h4>Latest Evidence:</h4>
            <pre id="latest-evidence" class="alert alert-info">
No data available...</pre
            >
          </div>
        </div>
      </div>
    </div>

    <!-- JavaScript and AJAX for real-time updates -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
      function fetchData() {
        $.ajax({
          url: "/path/to/report.json", // URL to fetch report data from
          method: "GET",
          success: function (data) {
            if (data) {
              // Update threat counts
              $("#low-threat").text(data.threatCount.Low);
              $("#medium-threat").text(data.threatCount.Medium);
              $("#high-threat").text(data.threatCount.High);
              $("#critical-threat").text(data.threatCount.Critical);

              // Update latest evidence
              $("#latest-evidence").text(
                data.latestEvidence || "No evidence available."
              );
            }
          },
          error: function () {
            console.error("Error fetching data.");
          },
        });
      }

      // Fetch data every 5 seconds for real-time updates
      setInterval(fetchData, 5000);
      fetchData(); // Initial fetch when the page loads
    </script>
  </body>
</html>
